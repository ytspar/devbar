# Deploy playground to Cloudflare Pages
#
# Triggers:
# - Push to main branch
# - Push to test/* or playground/* branches
# - Manual workflow dispatch
#
# The playground is deployed to https://devbar.dev/

name: Deploy Playground

on:
  push:
    branches:
      - main
      - 'test/*'
      - 'playground/*'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'cloudflare-pages-${{ github.ref }}'
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'devbar' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Generate coverage data
        run: |
          pnpm test:coverage
          node -e "
            const s = require('./coverage/coverage-summary.json');
            const t = s.total;
            const data = {
              statements: +t.statements.pct,
              branches: +t.branches.pct,
              functions: +t.functions.pct,
              lines: +t.lines.pct,
            };
            require('fs').writeFileSync(
              'packages/playground/public/coverage.json',
              JSON.stringify(data)
            );
          "

      - name: Build playground for Cloudflare Pages
        run: pnpm --filter playground build
        env:
          NODE_ENV: production
          VITE_BASE_URL: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          wranglerVersion: 3.114.17
          command: pages deploy packages/playground/dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

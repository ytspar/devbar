# Publish npm releases through a single npm trusted-publisher workflow.
#
# npm allows one trusted publisher connection per package, so production and
# canary publishing both live in this workflow. Configure each npm package to
# trust GitHub repository ytspar/devbar and workflow release.yml.
#
# Keep publish steps free of NODE_AUTH_TOKEN/NPM_TOKEN. pnpm publish resolves
# workspace:* ranges before upload, and with no static token configured it lets
# npm's trusted-publisher OIDC exchange authenticate the publish.
#
# The manual production dispatch below is EMERGENCY-ONLY now that
# release-please owns routine releases: it writes package.json and tags
# WITHOUT updating .release-please-manifest.json, so after any manual
# release you must also bump that manifest to the released version or the
# next release-please run computes from a stale baseline.

name: Package Release

on:
  push:
    branches:
      - main
    # release-please merge → per-package tag → npm publish (tag-release job).
    # The publish MUST live in this file: npm trusted publishing binds the
    # OIDC trust to (repo, workflow file), and both packages trust release.yml.
    tags:
      - 'sweetlink-v*'
      - 'devbar-v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        type: choice
        default: production
        options:
          - production
          - canary
      sweetlink_version:
        description: 'Sweetlink production version (e.g. 1.2.0) - leave blank to skip'
        required: false
        type: string
      devbar_version:
        description: 'Devbar production version (e.g. 1.3.0) - leave blank to skip'
        required: false
        type: string
      version_suffix:
        description: 'Canary suffix (defaults to git short SHA)'
        required: false
        type: string

jobs:
  # Tag-triggered production publish (release-please path). The tag is
  # created by merging a release-please Release PR, which has already
  # bumped package.json — so this job only verifies and publishes; the
  # GitHub release is created by release-please itself.
  tag-release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Parse and validate tag
        id: tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if echo "$TAG" | grep -qE '^sweetlink-v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "package=sweetlink" >> "$GITHUB_OUTPUT"
          elif echo "$TAG" | grep -qE '^devbar-v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "package=devbar" >> "$GITHUB_OUTPUT"
          else
            echo "Unrecognized release tag: $TAG (expected sweetlink-vX.Y.Z or devbar-vX.Y.Z)" >&2
            exit 1
          fi
          echo "version=${TAG##*-v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Verify package version matches tag
        env:
          PKG: ${{ steps.tag.outputs.package }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd "packages/$PKG"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag version ($VERSION) — was the release-please PR merged?" >&2
            exit 1
          fi

      - name: Publish
        env:
          PKG: ${{ steps.tag.outputs.package }}
        run: |
          cd "packages/$PKG"
          pnpm publish --tag latest --access public --provenance --no-git-checks

      - name: Summary
        env:
          PKG: ${{ steps.tag.outputs.package }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          echo "## Production Release Published (release-please)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`@ytspar/${PKG}@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

  canary:
    if: (github.event_name == 'push' && github.ref_type == 'branch') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'canary')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Get version suffix
        id: version
        env:
          INPUT_SUFFIX: ${{ inputs.version_suffix }}
        run: |
          if [ -n "$INPUT_SUFFIX" ]; then
            echo "suffix=$INPUT_SUFFIX" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Update sweetlink version for canary
        env:
          VERSION_SUFFIX: ${{ steps.version.outputs.suffix }}
        run: |
          cd packages/sweetlink
          VERSION=$(node -p "require('./package.json').version")
          CANARY_VERSION="${VERSION}-canary.${VERSION_SUFFIX}"
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '$CANARY_VERSION'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Publishing @ytspar/sweetlink@$CANARY_VERSION"

      - name: Update devbar version for canary
        env:
          VERSION_SUFFIX: ${{ steps.version.outputs.suffix }}
        run: |
          cd packages/devbar
          VERSION=$(node -p "require('./package.json').version")
          CANARY_VERSION="${VERSION}-canary.${VERSION_SUFFIX}"
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '$CANARY_VERSION'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Publishing @ytspar/devbar@$CANARY_VERSION"

      - name: Publish sweetlink canary
        run: |
          cd packages/sweetlink
          pnpm publish --tag canary --access public --provenance --no-git-checks

      - name: Publish devbar canary
        run: |
          cd packages/devbar
          pnpm publish --tag canary --access public --provenance --no-git-checks

      - name: Summary
        env:
          VERSION_SUFFIX: ${{ steps.version.outputs.suffix }}
        run: |
          echo "## Canary Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version suffix: \`${VERSION_SUFFIX}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install with:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "npm i @ytspar/sweetlink@canary" >> "$GITHUB_STEP_SUMMARY"
          echo "npm i @ytspar/devbar@canary" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'production'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Validate inputs
        env:
          SL_VERSION: ${{ inputs.sweetlink_version }}
          DB_VERSION: ${{ inputs.devbar_version }}
        run: |
          if [ -z "$SL_VERSION" ] && [ -z "$DB_VERSION" ]; then
            echo "Error: At least one package version must be provided"
            exit 1
          fi
          for v in "$SL_VERSION" "$DB_VERSION"; do
            if [ -n "$v" ] && ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Error: '$v' is not valid semver (e.g. 1.1.0)"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Validate release notes
        env:
          SL_VERSION: ${{ inputs.sweetlink_version }}
          DB_VERSION: ${{ inputs.devbar_version }}
        run: |
          ARGS=""
          if [ -n "$SL_VERSION" ]; then ARGS="$ARGS sweetlink=$SL_VERSION"; fi
          if [ -n "$DB_VERSION" ]; then ARGS="$ARGS devbar=$DB_VERSION"; fi
          node scripts/check-release-notes.mjs --check $ARGS

      - name: Publish sweetlink
        if: inputs.sweetlink_version != ''
        env:
          VERSION: ${{ inputs.sweetlink_version }}
        run: |
          cd packages/sweetlink
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = process.env.VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Publishing @ytspar/sweetlink@$VERSION"
          pnpm publish --tag latest --access public --provenance --no-git-checks

      - name: Create sweetlink GitHub release
        if: inputs.sweetlink_version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.sweetlink_version }}
        run: |
          git tag "sweetlink-v${VERSION}"
          git push origin "sweetlink-v${VERSION}"
          gh release create "sweetlink-v${VERSION}" \
            --title "sweetlink v${VERSION}" \
            --generate-notes

      - name: Publish devbar
        if: inputs.devbar_version != ''
        env:
          VERSION: ${{ inputs.devbar_version }}
        run: |
          cd packages/devbar
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = process.env.VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Publishing @ytspar/devbar@$VERSION"
          pnpm publish --tag latest --access public --provenance --no-git-checks

      - name: Create devbar GitHub release
        if: inputs.devbar_version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.devbar_version }}
        run: |
          git tag "devbar-v${VERSION}"
          git push origin "devbar-v${VERSION}"
          gh release create "devbar-v${VERSION}" \
            --title "devbar v${VERSION}" \
            --generate-notes

      - name: Summary
        env:
          SL_VERSION: ${{ inputs.sweetlink_version }}
          DB_VERSION: ${{ inputs.devbar_version }}
        run: |
          echo "## Production Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$SL_VERSION" ]; then
            echo "- \`@ytspar/sweetlink@${SL_VERSION}\` -> [sweetlink-v${SL_VERSION}](https://github.com/ytspar/devbar/releases/tag/sweetlink-v${SL_VERSION})" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$DB_VERSION" ]; then
            echo "- \`@ytspar/devbar@${DB_VERSION}\` -> [devbar-v${DB_VERSION}](https://github.com/ytspar/devbar/releases/tag/devbar-v${DB_VERSION})" >> "$GITHUB_STEP_SUMMARY"
          fi

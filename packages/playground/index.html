<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devbar — Development toolbar and AI debugging toolkit</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#10b981" />

    <!-- Standard meta tags -->
    <meta name="description" content="Development toolbar and AI debugging toolkit. Breakpoint indicator, Core Web Vitals, console capture, screenshots, and a WebSocket bridge for AI agents." />
    <meta name="author" content="ytspar" />
    <meta name="application-name" content="devbar" />
    <meta name="agent-entrypoint" content="https://devbar.dev/llms.txt" />
    <meta name="agent-install" content="pnpm add @ytspar/devbar @ytspar/sweetlink" />
    <meta name="agent-protocol" content="inspect-act-verify with Sweetlink @e refs, screenshots, console, network, accessibility, and vitals evidence" />
    <link rel="canonical" href="https://devbar.dev/" />
    <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM setup guide for Codex and Claude" />

    <!-- Open Graph meta tags -->
    <meta property="og:title" content="devbar — Development toolbar and AI debugging toolkit" />
    <meta property="og:description" content="Development toolbar and AI debugging toolkit. Breakpoint indicator, Core Web Vitals, console capture, screenshots, and a WebSocket bridge for AI agents." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://devbar.dev/" />
    <meta property="og:image" content="og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="devbar — Development toolbar and AI debugging toolkit" />
    <meta name="twitter:description" content="Development toolbar and AI debugging toolkit. Breakpoint indicator, Core Web Vitals, console capture, screenshots, and a WebSocket bridge for AI agents." />
    <meta name="twitter:image" content="og-image.png" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "devbar",
      "description": "Development toolbar and AI debugging toolkit. Breakpoint indicator, Core Web Vitals, console capture, screenshots, and a WebSocket bridge for AI agents.",
      "url": "https://devbar.dev/",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "author": {
        "@type": "Person",
        "name": "ytspar",
        "url": "https://github.com/ytspar"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "softwareRequirements": "Node.js 20+, pnpm, a local Vite or Next.js development server",
      "codeRepository": "https://github.com/ytspar/devbar",
      "isAccessibleForFree": true,
      "keywords": [
        "Codex",
        "Claude",
        "AI browser testing",
        "frontend verification",
        "screenshots",
        "accessibility",
        "Web Vitals",
        "console logs"
      ],
      "potentialAction": {
        "@type": "UseAction",
        "name": "Install devbar and sweetlink",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://devbar.dev/llms.txt"
        }
      }
    }
    </script>

    <script type="application/json" id="devbar-agent-context">
      {
        "name": "devbar",
        "llmsTxt": "https://devbar.dev/llms.txt",
        "install": "pnpm add @ytspar/devbar @ytspar/sweetlink",
        "protocol": "inspect-act-verify",
        "primaryCommand": "pnpm sweetlink inspect --url <local-url> --json",
        "agentInstruction": "Use Devbar and Sweetlink for browser verification. Inspect before and after UI changes, act through returned @e refs, and cite screenshots, console, network, accessibility, and vitals evidence."
      }
    </script>

    <!-- Departure Mono font - retro pixel terminal aesthetic -->
    <!-- https://departuremono.com - SIL Open Font License -->
    <style>
      @font-face {
        font-family: 'Departure Mono';
        src: url('/fonts/DepartureMono-Regular.woff2') format('woff2'),
             url('/fonts/DepartureMono-Regular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
    </style>

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
